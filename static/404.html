<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сторінку не знайдено — Мар'яна Вербицька</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f0ebe3;
      --green-sage: #7a9485;
      --green-dark: #3d5245;
      --forest: #2e3830;
      --text-body: #556159;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .symbol {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      opacity: 0.6;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 300;
      color: var(--green-sage);
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--forest);
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: var(--text-body);
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: var(--green-dark);
      color: #f0ebe3;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 30px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--forest); }
  </style>
</head>
<body>
  <img src="/favicon-512.png" alt="" class="symbol">
  <div class="code">404</div>
  <h1>Сторінку не знайдено</h1>
  <p>Схоже, ця сторінка не існує або була переміщена. Повернімося туди, де є простір і тепло.</p>
  <a href="/" class="btn">На головну</a>
</body>
</html>

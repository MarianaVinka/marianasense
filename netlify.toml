# ===============================================
# Netlify configuration — marianasense.com
# Сайт статичний (HTML/CSS/JS), без збірки.
# ===============================================

[build]
  # Каталог із готовим сайтом — корінь репозиторію
  publish = "."
  # Команди збірки немає — сайт статичний
  command = ""

# ===============================================
# Identity + Git Gateway (потрібно для Decap CMS)
# ===============================================
# ВАЖЛИВО: окрім цього треба вручну увімкнути
#   1. Site → Identity → Enable Identity
#   2. Identity → Services → Git Gateway → Enable
#   3. (опційно) Identity → Registration → Invite only
# ===============================================

[template.environment]
  IDENTITY_INSTANCE_ID = "marianasense"

# Заголовки безпеки
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Для /admin/ дозволяємо завантаження CMS-скриптів з unpkg
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

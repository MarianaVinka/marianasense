[build]
  publish = "_site"
  command = "npm run build"
 
[build.environment]
  NODE_VERSION = "20"
 
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
 
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"
 

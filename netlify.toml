# ===============================================
# Netlify configuration — marianasense.com
# Сайт збирається через Eleventy (11ty).
# ===============================================

[build]
  # Eleventy кладе готовий сайт у папку _site
  publish = "_site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Редірект /admin → /admin/
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

# ===============================================
# Identity + Git Gateway (потрібно для Decap CMS)
# ВАЖЛИВО: окрім цього треба вручну увімкнути в Netlify:
#   1. Site → Identity → Enable Identity
#   2. Identity → Services → Git Gateway → Enable
#   3. Identity → Registration → Invite only (і запросити себе)
# ===============================================

# Заголовки безпеки
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

backend:
  name: git-gateway
  branch: main

# Мова інтерфейсу адмінки
locale: uk

# Куди завантажуються картинки зі статей
media_folder: "static/blog-images"
public_folder: "/blog-images"

collections:
  - name: "blog"
    label: "Статті блогу"
    label_singular: "Стаття"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Заголовок", name: "title", widget: "string", hint: "Назва статті — стане заголовком сторінки" }
      - { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false }
      - label: "Категорія"
        name: "category"
        widget: "select"
        options: ["Тривога", "Травма", "Арт-терапія", "Стосунки", "Вигорання", "Загальне"]
      - { label: "Короткий опис (для прев'ю і SEO)", name: "excerpt", widget: "text", hint: "1–2 речення. Показується у списку блогу і в пошуку Google" }
      - { label: "Час читання", name: "readingTime", widget: "string", required: false, default: "5 хв читання" }
      - { label: "Обкладинка (необов'язково)", name: "cover", widget: "image", required: false, hint: "Якщо не додати — для прев'ю використається загальна картинка сайту" }
      - { label: "Текст статті", name: "body", widget: "markdown" }
